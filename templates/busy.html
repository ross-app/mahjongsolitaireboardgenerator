<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Mahjong Solitaire Board Generator - Please Wait</title>
  <meta http-equiv="refresh" content="5;url={{ url_for('result') }}">
  <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}">
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      margin: 40px;
      color: #222;
    }
    .container {
      max-width: 800px;
      margin: auto;
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      text-align: center;
    }
    .spinner {
      margin: 30px auto;
      width: 48px;
      height: 48px;
      border: 5px solid #e0e0e0;
      border-top-color: #2d6cdf;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    p { color: #555; }
    a.button {
      display: inline-block;
      margin-top: 20px;
      padding: 10px 16px;
      background: #2d6cdf;
      color: white;
      text-decoration: none;
      border-radius: 8px;
    }
    a.button:hover { background: #1f56b8; }
  </style>
</head>
<body>
  <div class="container">
    <h1>One moment…</h1>
    <div class="spinner"></div>
    <p>A board is currently being generated for another user.</p>
    <p>This page will automatically retry in <strong>5 seconds</strong>.</p>
    <a class="button" href="{{ url_for('result') }}">Retry now</a>
  </div>
</body>
</html>
